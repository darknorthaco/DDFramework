<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 880" width="720" height="880">
  <title>DDFramework layer stack</title>
  <desc>DDFramework engine layers (ddf-exec, Constellation, GHOST, Ledger), kernel boundary, applications. Import into Visio or Inkscape for editing.</desc>
  <defs>
    <linearGradient id="gApp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eef5"/><stop offset="100%" stop-color="#d0dae8"/>
    </linearGradient>
    <linearGradient id="gKernel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4ea"/><stop offset="100%" stop-color="#c8e6d0"/>
    </linearGradient>
    <linearGradient id="gConst" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e8ff"/><stop offset="100%" stop-color="#dcc4f0"/>
    </linearGradient>
    <linearGradient id="gPhantom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4e6"/><stop offset="100%" stop-color="#ffd9a8"/>
    </linearGradient>
    <linearGradient id="gGhost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f8ff"/><stop offset="100%" stop-color="#b8e0f5"/>
    </linearGradient>
    <linearGradient id="gHyp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef0f3"/><stop offset="100%" stop-color="#cfd6de"/>
    </linearGradient>
    <linearGradient id="gLed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3748"/><stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="10" orient="auto">
      <path d="M0,0 L10,0 L5,10 Z" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="720" height="880" fill="#fafafa"/>
  <text x="360" y="36" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#1a202c">DDFramework  layer stack</text>
  <text x="360" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="12" fill="#718096">Engine identity: DDFRAMEWORK.md ¯ Mechanical glossary: GLOSSARY_ENGINE_NAMES.md</text>

  <!-- Applications -->
  <rect x="80" y="78" width="560" height="72" rx="6" fill="url(#gApp)" stroke="#718096" stroke-width="1.5"/>
  <text x="360" y="108" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#1a202c">Application Era (v5.0.0+)</text>
  <text x="360" y="128" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="12" fill="#2d3748">Apps depend on kernel API only  not on ddf-exec-core / ghost-observer directly</text>
  <line x1="360" y1="150" x2="360" y2="168" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Kernel -->
  <rect x="80" y="168" width="560" height="88" rx="6" fill="url(#gKernel)" stroke="#2f855a" stroke-width="1.5"/>
  <text x="360" y="198" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#1a202c">ddf-core  kernel boundary (stable)</text>
  <text x="360" y="218" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="11" fill="#2d3748">ddf Rust crate + ddf binary ¯ ddf_py Python ¯ simulation/ (Phase 6)</text>
  <text x="360" y="238" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="11" fill="#2d3748">KERNEL_API_MAP.md</text>
  <line x1="360" y1="256" x2="360" y2="274" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Five layers row -->
  <text x="360" y="298" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1a202c">Five engine layers (together = DDFramework engine)</text>

  <!-- Constellation -->
  <rect x="80" y="312" width="170" height="100" rx="6" fill="url(#gConst)" stroke="#6b46c1" stroke-width="1.5"/>
  <text x="165" y="342" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1a202c">Constellation</text>
  <text x="165" y="362" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="10" fill="#2d3748">Constitution</text>
  <text x="165" y="378" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="9" fill="#4a5568">CONSTELLATION.md</text>
  <text x="165" y="392" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="9" fill="#4a5568">constellation.toml</text>

  <!-- ddf-exec (engine executor; historically Phantom) -->
  <rect x="275" y="312" width="170" height="100" rx="6" fill="url(#gPhantom)" stroke="#c05621" stroke-width="1.5"/>
  <text x="360" y="338" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1a202c">ddf-exec</text>
  <text x="360" y="356" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="10" fill="#2d3748">Ritual executor</text>
  <text x="360" y="372" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="9" fill="#4a5568">ddf-exec-core - ddf-exec</text>
  <text x="360" y="388" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="9" fill="#c05621" font-weight="600">Sole writer ¯ main ledger</text>

  <!-- GHOST -->
  <rect x="470" y="312" width="170" height="100" rx="6" fill="url(#gGhost)" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="555" y="338" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1a202c">GHOST</text>
  <text x="555" y="356" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="10" fill="#2d3748">Read-only advisor</text>
  <text x="555" y="372" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="9" fill="#4a5568">ghost-observer</text>
  <text x="555" y="388" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="9" fill="#2b6cb0" font-weight="600">Writer ¯ advisory stream</text>

  <!-- Ledger -->
  <rect x="120" y="528" width="480" height="100" rx="6" fill="url(#gLed)" stroke="#1a202c" stroke-width="1.5"/>
  <text x="360" y="562" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#f7fafc">Ledger  truth substrate</text>
  <text x="360" y="586" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="11" fill="#e2e8f0">ledger/events.jsonl (main) ¯ advisories/stream.jsonl</text>
  <text x="360" y="606" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="10" fill="#cbd5e0">Append-only ¯ hash-chained ¯ I1 / I7 / I8 write boundaries</text>

  <!-- Legend -->
  <rect x="80" y="658" width="560" height="180" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
  <text x="100" y="686" font-family="Segoe UI, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#1a202c">Legend</text>
  <text x="100" y="708" font-family="Segoe UI, Helvetica, sans-serif" font-size="11" fill="#2d3748">" Constellation: normative principles above architectural doctrine.</text>
  <text x="100" y="728" font-family="Segoe UI, Helvetica, sans-serif" font-size="11" fill="#2d3748">" ddf-exec: runs rituals; enforces invariants; embeds doctrine hash (I6).</text>
  <text x="100" y="748" font-family="Segoe UI, Helvetica, sans-serif" font-size="11" fill="#2d3748">" GHOST: reads main ledger; never writes it; emits advisories (I8).</text>
  <text x="100" y="768" font-family="Segoe UI, Helvetica, sans-serif" font-size="11" fill="#2d3748">" Ledger: two streams; ddf-exec vs GHOST write split is the core trust model.</text>
  <text x="100" y="812" font-family="Segoe UI, Helvetica, sans-serif" font-size="10" fill="#718096">SVG source: docs/images/ddf-layers-stack.svg  edit in Inkscape or Visio after import.</text>

  <text x="360" y="864" text-anchor="middle" font-family="Segoe UI, Helvetica, sans-serif" font-size="10" fill="#a0aec0">DDFramework engine ¯ diagram for planning only ¯ not normative vs DOCTRINE.md</text>
</svg>
